apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: choam
  annotations:
    traefik.ingress.kubernetes.io/router.middlewares: choam-dev-strip-prefix@kubernetescrd
spec:
  rules:
    - host: dev.chrispicloud.dev
      http:
        paths:
          - path: /choam/api
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /choam
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  number: 80
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: strip-prefix
spec:
  stripPrefix:
    prefixes:
      - /choam
