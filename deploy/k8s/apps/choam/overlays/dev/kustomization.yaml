apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: choam-dev

resources:
  - ../../base
  - ingress.yaml

configMapGenerator:
  - name: app-config
    literals:
      - ASPNETCORE_ENVIRONMENT=Development

# Secrets are created manually on the cluster (not in git):
#   kubectl -n choam-dev create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=... --from-literal=POSTGRES_PASSWORD=... --from-literal=POSTGRES_DB=...
#   kubectl -n choam-dev create secret generic app-secrets \
#     --from-literal=CONNECTION_STRING="Host=postgres;Port=5432;Database=...;Username=...;Password=..."
#   kubectl -n choam-dev create secret docker-registry ghcr-credentials \
#     --docker-server=ghcr.io --docker-username=dreyssechris --docker-password=<PAT>

images:
  - name: ghcr.io/dreyssechris/choam-api
    newTag: sha-b0e434e77c0e1f7c263f47774681e0a1955e7591
  - name: ghcr.io/dreyssechris/choam-web
    newTag: sha-b0e434e77c0e1f7c263f47774681e0a1955e7591
