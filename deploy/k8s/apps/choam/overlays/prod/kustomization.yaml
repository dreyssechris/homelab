apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: choam-prod

resources:
  - ../../base
  - ingress.yaml

configMapGenerator:
  - name: app-config
    literals:
      - ASPNETCORE_ENVIRONMENT=Production

# Secrets are created manually on the cluster (not in git):
#   kubectl -n choam-prod create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=... --from-literal=POSTGRES_PASSWORD=... --from-literal=POSTGRES_DB=...
#   kubectl -n choam-prod create secret generic app-secrets \
#     --from-literal=CONNECTION_STRING="Host=postgres;Port=5432;Database=...;Username=...;Password=..."
#   kubectl -n choam-prod create secret docker-registry ghcr-credentials \
#     --docker-server=ghcr.io --docker-username=dreyssechris --docker-password=<PAT>

images:
  - name: ghcr.io/dreyssechris/choam-api
    newTag: v0.3.0
  - name: ghcr.io/dreyssechris/choam-web
    newTag: v0.3.0
