apiVersion: batch/v1
kind: CronJob
metadata:
  name: postgres-backup
  labels:
    app: postgres-backup
spec:
  schedule: "0 3 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 600
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: backup
              image: postgres:16-alpine
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  TIMESTAMP=$(date +%Y%m%d-%H%M%S)
                  FILENAME="${POSTGRES_DB}-${TIMESTAMP}.sql.gz"

                  echo "Starting backup: $FILENAME"
                  pg_dump -h postgres -U "$POSTGRES_USER" "$POSTGRES_DB" | gzip > "/backups/$FILENAME"
                  echo "Dump complete: $(du -h /backups/$FILENAME | cut -f1)"

                  echo "Cleaning backups older than 7 days..."
                  find /backups -name "*.sql.gz" -mtime +7 -delete

                  echo "Installing AWS CLI..."
                  apk add --no-cache aws-cli > /dev/null 2>&1

                  echo "Uploading to R2..."
                  aws --endpoint-url "$R2_ENDPOINT" s3 cp "/backups/$FILENAME" "s3://$R2_BUCKET/$FILENAME"
                  echo "Upload complete"
              envFrom:
                - secretRef:
                    name: postgres-credentials
                - secretRef:
                    name: r2-credentials
              env:
                - name: PGPASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: postgres-credentials
                      key: POSTGRES_PASSWORD
              volumeMounts:
                - name: backup-storage
                  mountPath: /backups
              resources:
                requests:
                  memory: 128Mi
                  cpu: 100m
                limits:
                  memory: 256Mi
                  cpu: 500m
          volumes:
            - name: backup-storage
              hostPath:
                path: /mnt/storage/backups/choam
                type: DirectoryOrCreate
