apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: financetracker-dev

resources:
  - ../../base
  - ingress.yaml

configMapGenerator:
  - name: app-config
    literals:
      - ASPNETCORE_ENVIRONMENT=Development

# Secrets are created manually on the cluster (not in git):
#   kubectl -n financetracker-dev create secret generic postgres-credentials \
#     --from-literal=POSTGRES_USER=... --from-literal=POSTGRES_PASSWORD=... --from-literal=POSTGRES_DB=...
#   kubectl -n financetracker-dev create secret generic app-secrets \
#     --from-literal=CONNECTION_STRING="Host=postgres;Port=5432;Database=...;Username=...;Password=..."
#   kubectl -n financetracker-dev create secret docker-registry ghcr-credentials \
#     --docker-server=ghcr.io --docker-username=dreyssechris --docker-password=<PAT>

images:
  - name: ghcr.io/dreyssechris/finance-tracker-api
    newTag: sha-64f506cbc597bed93a3a8445d2ab6571dc9280d9
  - name: ghcr.io/dreyssechris/finance-tracker-web
    newTag: sha-64f506cbc597bed93a3a8445d2ab6571dc9280d9
