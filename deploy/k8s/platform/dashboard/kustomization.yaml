apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - dashboard.yaml
  - admin-user.yaml
  - ingress.yaml
patches:
  # Enable HTTP on port 9090 so Traefik can route without TLS complications
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: kubernetes-dashboard
        namespace: kubernetes-dashboard
      spec:
        template:
          spec:
            containers:
              - name: kubernetes-dashboard
                args:
                  - --auto-generate-certificates
                  - --namespace=kubernetes-dashboard
                  - --enable-insecure-login
                ports:
                  - containerPort: 8443
                    protocol: TCP
                  - containerPort: 9090
                    protocol: TCP
  # Expose port 9090 on the service
  - patch: |-
      apiVersion: v1
      kind: Service
      metadata:
        name: kubernetes-dashboard
        namespace: kubernetes-dashboard
      spec:
        ports:
          - port: 443
            targetPort: 8443
          - port: 9090
            targetPort: 9090
