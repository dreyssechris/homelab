apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
  namespace: platform
spec:
  interval: 1h
  chart:
    spec:
      chart: headlamp
      version: ">=0.0.0"
      sourceRef:
        kind: HelmRepository
        name: headlamp
        namespace: flux-system
      interval: 1h
  values:
    replicaCount: 1
    resources:
      requests:
        memory: "64Mi"
        cpu: "50m"
      limits:
        memory: "128Mi"
        cpu: "200m"
    # Ingress is handled via a separate Traefik IngressRoute
    ingress:
      enabled: false
